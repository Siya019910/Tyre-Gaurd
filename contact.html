<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TyreGuard — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#d6b45a;--red:#c62828;--black:#000;--gold-glow:rgba(214,180,90,0.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999;}
body{font-family:'Rajdhani',sans-serif;color:#fff;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}
 
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,0.85);border-bottom:1px solid rgba(214,180,90,0.3);backdrop-filter:blur(12px);padding:14px 24px;}
nav{display:flex;justify-content:center;gap:32px;}
nav a{color:#fff;text-decoration:none;font-weight:700;font-size:12px;letter-spacing:3px;text-transform:uppercase;position:relative;padding-bottom:4px;transition:color 0.3s;}
nav a::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform 0.3s;}
nav a:hover{color:var(--gold);}
nav a:hover::after{transform:scaleX(1);}
 
.container{
  flex:1;position:relative;overflow:hidden;
  padding:110px 20px 60px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;background-size:cover;background-position:center;
  animation:slideBg 12s infinite;
}
@keyframes slideBg{0%{background-image:url('img1.jpg');}50%{background-image:url('img2.jpg');}100%{background-image:url('img1.jpg');}}
.container::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.68);pointer-events:none;z-index:0;}
.container::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(214,180,90,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(214,180,90,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
 
.inner{position:relative;z-index:1;text-align:center;width:100%;max-width:560px;}
 
.brand-badge{display:inline-block;background:#fff;padding:6px 16px;border-radius:6px;margin-bottom:8px;opacity:0;animation:fadeUp 0.6s 0.1s forwards;}
.brand-badge .name{font-family:Pacifico,cursive;font-size:36px;color:#000;}
.slogan{font-style:italic;color:#000;background:#fff;padding:3px 10px;border-radius:4px;display:inline-block;font-size:14px;margin-bottom:30px;opacity:0;animation:fadeUp 0.6s 0.3s forwards;}
 
/* contact card */
.card{
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(214,180,90,0.25);
  border-radius:10px;
  overflow:hidden;
  width:100%;
  opacity:0;animation:fadeUp 0.7s 0.45s forwards;
}
.card-header{
  padding:12px 20px;
  border-bottom:1px solid rgba(214,180,90,0.15);
  background:rgba(214,180,90,0.06);
  display:flex;align-items:center;gap:8px;
}
.card-header span{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
 
.contact-rows{padding:8px 0;}
 
.row{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  border-bottom:1px solid rgba(214,180,90,0.1);
  transition:background 0.2s;
}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(214,180,90,0.05);}
 
.row-icon{
  width:38px;height:38px;flex-shrink:0;
  border-radius:50%;border:1px solid rgba(214,180,90,0.3);
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.4);
}
.row-icon svg{width:18px;height:18px;}
 
.row-body{text-align:left;flex:1;}
.row-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.row-value{font-size:15px;font-weight:600;color:#fff;}
.row-value a{color:#fff;text-decoration:none;}
.row-value a:hover{color:var(--gold);}
 
/* action buttons */
.actions{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  padding:18px 20px;
  border-top:1px solid rgba(214,180,90,0.15);
  background:rgba(0,0,0,0.3);
}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;border-radius:999px;
  border:2px solid rgba(214,180,90,0.5);
  background:linear-gradient(135deg,rgba(214,180,90,0.1),rgba(0,0,0,0.2));
  text-decoration:none;font-weight:700;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;color:#fff;
  font-family:'Orbitron',sans-serif;
  transition:all 0.3s;
}
.btn:hover{box-shadow:0 0 24px var(--gold-glow);transform:translateY(-2px);border-color:var(--gold);}
.btn svg{width:16px;height:16px;}
 
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
footer{background:#000;text-align:center;padding:14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);border-top:1px solid rgba(214,180,90,0.15);}
 
@media(max-width:500px){.brand-badge .name{font-size:28px;}.row{flex-direction:column;align-items:flex-start;}.row-icon{display:none;}}
</style>
</head>
